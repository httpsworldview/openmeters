name: openmeters
arch: amd64
platform: linux
version: ${VERSION}
version_schema: semver
release: ${RELEASE}
section: sound
priority: optional
maintainer: Maika Namuo <httpworldview@gmail.com>
description: |
  Fast and professional audio metering application for Linux.
  LUFS/RMS/true-peak loudness, spectrogram with spectral reassignment,
  spectrum analyzer, oscilloscope, stereometer, and waveform views.
vendor: httpsworldview
homepage: https://github.com/httpsworldview/openmeters
license: GPL-3.0-or-later

# Debian family
depends:
  - libc6 (>= ${GLIBC_VERSION})
  - libgcc-s1
  - libpipewire-0.3-0 (>= ${MIN_PIPEWIRE_VERSION})
  - libwayland-client0
  - libvulkan1
  - libx11-6
  - libx11-xcb1
  - libxcb1
  - libxcursor1
  - libxi6
  - libxkbcommon0
  - libxkbcommon-x11-0

recommends:
  - hicolor-icon-theme
  - desktop-file-utils

overrides:
  rpm:
    depends:
      - glibc >= ${GLIBC_VERSION}
      - libgcc
      - pipewire-libs >= ${MIN_PIPEWIRE_VERSION}
      - libwayland-client
      - vulkan-loader
      - libX11
      - libX11-xcb
      - libxcb
      - libXcursor
      - libXi
      - libxkbcommon
      - libxkbcommon-x11
    recommends:
      - hicolor-icon-theme
      - desktop-file-utils

rpm:
  summary: Fast audio metering for Linux
  compression: zstd

contents:
  - src: ../target/release/openmeters
    dst: /usr/bin/openmeters
    file_info:
      mode: 0755

  - src: ../misc/openmeters.desktop
    dst: /usr/share/applications/openmeters.desktop
    file_info:
      mode: 0644

  - src: ../misc/openmeters.svg
    dst: /usr/share/icons/hicolor/scalable/apps/openmeters.svg
    file_info:
      mode: 0644

  - src: ../LICENSE
    dst: /usr/share/licenses/openmeters/LICENSE
    file_info:
      mode: 0644

  - src: ../docs/licenses/iced_widget_pane_grid.md
    dst: /usr/share/licenses/openmeters/iced_widget_pane_grid.md
    file_info:
      mode: 0644

  - src: copyright
    dst: /usr/share/doc/openmeters/copyright
    file_info:
      mode: 0644
