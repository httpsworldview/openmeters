name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    container:
      image: debian:13

    steps:
      - name: Install workflow prerequisites
        shell: bash
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates curl gh git
          rm -rf /var/lib/apt/lists/*

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Validate release tag and prepare notes
        id: release
        shell: bash
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          cargo_value() {
            local key="$1"
            awk -F'"' -v key="$key" '
              /^[[:space:]]*\[package\][[:space:]]*$/ { in_pkg = 1; next }
              /^[[:space:]]*\[/ { in_pkg = 0 }
              in_pkg && $0 ~ "^[[:space:]]*" key "[[:space:]]*=" { print $2; exit }
            '
          }

          version="$(cargo_value version < Cargo.toml)"
          if [ -z "$version" ]; then
            echo "Could not parse package.version from Cargo.toml" >&2
            exit 1
          fi

          tag="${TAG_NAME}"
          expected_tag="v${version}"
          if [ "$tag" != "$expected_tag" ]; then
            echo "Release tag ${tag} does not match Cargo.toml package.version (${version}); expected ${expected_tag}." >&2
            exit 1
          fi

          rust_toolchain="$(cargo_value rust-version < Cargo.toml)"
          rust_toolchain="${rust_toolchain:-stable}"

          previous_tag="$(git tag --merged HEAD --sort=-v:refname --list 'v[0-9]*.[0-9]*.[0-9]*' \
            | grep -Fvx "$tag" \
            | head -n 1 || true)"

          changelog_range="${GITHUB_SHA}"
          if [ -n "$previous_tag" ] && git rev-parse "${previous_tag}^{commit}" >/dev/null 2>&1; then
            changelog_range="${previous_tag}..${GITHUB_SHA}"
          fi

          changelog="$(git log --no-merges --pretty=format:'%h %s' "$changelog_range" 2>/dev/null || true)"
          if [ -z "$changelog" ]; then
            changelog="(no changelog entries)"
          fi

          notes_file="${RUNNER_TEMP}/release-notes.md"
          {
            echo "## Changelog"
            echo
            echo '```'
            printf '%s\n' "$changelog"
            echo '```'
          } > "$notes_file"

          {
            echo "version=${version}"
            echo "rust_toolchain=${rust_toolchain}"
            echo "tag=${tag}"
            echo "notes_file=${notes_file}"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure release does not already exist
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release ${TAG_NAME} already exists; refusing to overwrite it." >&2
            exit 1
          fi

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ steps.release.outputs.rust_toolchain }}

      - name: Build and publish release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          glibc_version="$(ldd --version | awk 'NR==1 {print $NF}')"
          echo "glibc version: ${glibc_version}"
          if ! dpkg --compare-versions "${glibc_version}" ge 2.41; then
            echo "Debian release pipeline requires glibc >= 2.41"
            exit 1
          fi

          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            golang-go \
            libpipewire-0.3-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxext-dev \
            libxfixes-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libvulkan-dev \
            make \
            pkg-config \
            xz-utils
          rm -rf /var/lib/apt/lists/*

          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.46.3
          export PATH="${HOME}/go/bin:${PATH}"

          cargo build --locked --release
          make -C packaging all

          version="${{ steps.release.outputs.version }}"
          tag="${{ steps.release.outputs.tag }}"
          notes_file="${{ steps.release.outputs.notes_file }}"
          dist_dir="${PWD}/dist"

          shopt -s nullglob
          assets=(
            "${dist_dir}"/openmeters-"${version}"-*.tar.xz
            "${dist_dir}"/openmeters_"${version}"-*.deb
            "${dist_dir}"/openmeters-"${version}"-*.rpm
            "${dist_dir}"/SHA256SUMS
          )
          shopt -u nullglob

          if [ "${#assets[@]}" -ne 4 ]; then
            echo "Expected 4 release artifacts in ${dist_dir}, found ${#assets[@]}."
            for asset in "${assets[@]}"; do
              echo "  ${asset}"
            done
            exit 1
          fi

          gh release create "$tag" --target "$GITHUB_SHA" --title "openmeters ${version}" --notes-file "$notes_file" --verify-tag "${assets[@]}"
