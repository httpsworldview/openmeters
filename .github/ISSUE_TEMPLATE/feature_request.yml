name: Feature request
description: Suggest a focused improvement to OpenMeters.
title: "feat: "
labels: ["enhancement"]
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Before filing
      options:
        - label: I searched existing issues for a duplicate.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what gets in the way?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should OpenMeters do differently?
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Mockups, examples from other tools, standards references, prior discussions, etc. 
